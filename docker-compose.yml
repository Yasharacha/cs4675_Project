services:
  backend1:
    build: .
    container_name: urlshortener-backend1
    environment:
      DATABASE_PATH: /app/data/url_shortener.db
      INSTANCE_NAME: backend1
      FLASK_DEBUG: "false"
    volumes:
      - shared_data:/app/data
    expose:
      - "5000"

  backend2:
    build: .
    container_name: urlshortener-backend2
    environment:
      DATABASE_PATH: /app/data/url_shortener.db
      INSTANCE_NAME: backend2
      FLASK_DEBUG: "false"
    volumes:
      - shared_data:/app/data
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    container_name: urlshortener-nginx
    depends_on:
      - backend1
      - backend2
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  shared_data:
