events {}

http {
    upstream url_shortener_backend {
        server backend1:5000 max_fails=1 fail_timeout=5s;
        server backend2:5000 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://url_shortener_backend;
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
